<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — SoulDoc</title>
<link rel="stylesheet" href="style.css">
<style>
body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.login-wrap { width:100%; max-width:440px; }
.login-card { background:rgba(255,255,255,.97); border-radius:var(--radius-lg); padding:40px; box-shadow:var(--shadow-lg); backdrop-filter:blur(20px); }
.login-logo { width:56px;height:56px;border-radius:16px;background:var(--gradient);box-shadow:var(--shadow-primary);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px; }
.login-title { font-size:24px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-.5px; }
.login-sub { color:var(--muted);text-align:center;font-size:14px;margin-bottom:28px; }
.oauth-btn { display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--panel);color:var(--text2);font-weight:500;width:100%;margin-bottom:10px;transition:var(--transition);font-size:14px; }
.oauth-btn:hover { background:var(--panel3);border-color:var(--line2); }
.divider { display:flex;align-items:center;gap:12px;margin:20px 0; }
.divider-line { flex:1;height:1px;background:var(--line); }
.divider-text { color:var(--muted);font-size:12px;white-space:nowrap; }
.login-footer { text-align:center;margin-top:20px;font-size:13px;color:var(--muted); }
.login-footer a { color:var(--primary); }
.stars { position:fixed;inset:0;pointer-events:none;overflow:hidden; }
.star { position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:.6} }
</style>
</head>
<body>
<div class="login-wrap">
  <div style="text-align:center;margin-bottom:24px">
    <h1 style="color:#fff;font-size:28px;font-weight:800;letter-spacing:-.5px">SoulDoc</h1>
    <p style="color:rgba(255,255,255,.5);font-size:14px;margin-top:4px">AI 原生知识生产与管理平台</p>
  </div>

  <div class="login-card">
    <div class="login-logo">📚</div>
    <h2 class="login-title">欢迎回来</h2>
    <p class="login-sub">登录您的 SoulDoc 账号</p>

    <!-- OAuth Buttons -->
    <button class="oauth-btn" onclick="showToast('GitHub OAuth 跳转中...','default')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      使用 GitHub 登录
    </button>
    <button class="oauth-btn" onclick="showToast('Google OAuth 跳转中...','default')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 登录
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">或使用邮箱登录</div>
      <div class="divider-line"></div>
    </div>

    <div class="form-group">
      <label class="form-label">邮箱地址</label>
      <input class="input" type="email" placeholder="your@email.com" value="admin@souldoc.io">
    </div>
    <div class="form-group">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <label class="form-label" style="margin:0">密码</label>
        <a href="#" style="font-size:13px;color:var(--primary)" onclick="showToast('重置密码流程待接入','default');return false;">忘记密码？</a>
      </div>
      <input class="input" type="password" placeholder="••••••••" value="password123">
    </div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
      <input type="checkbox" id="remember" checked style="width:16px;height:16px;accent-color:var(--primary)">
      <label for="remember" style="font-size:13px;color:var(--muted);cursor:pointer">记住登录状态</label>
    </div>

    <button class="btn btn-primary w-full" style="justify-content:center;padding:12px;font-size:15px" onclick="location.href='index.html'">
      🔐 登录
    </button>

    <div class="login-footer">
      还没有账号？ <a href="#" onclick="showToast('请联系管理员注册账号','default');return false;">联系管理员</a>
      <div style="margin-top:8px"><a href="install.html">首次部署？安装向导 →</a></div>
    </div>
  </div>

  <div style="text-align:center;margin-top:20px;color:rgba(255,255,255,.3);font-size:12px">
    SoulDoc v2.0 · Powered by AI Native Architecture
  </div>
</div>

<script src="nav.js"></script>
</body>
</html>
