name: Deploy SoulBook Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: soulbook-frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start frontend deployment on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SOULBOOK_HOST }}
          username: root
          key: ${{ secrets.SOULBOOK_SSH_KEY }}
          command_timeout: 2m
          script: |
            set -e
            nohup /root/soulhub/deploy_soulbook_front.sh >/tmp/soulbook-frontend-deploy-trigger.log 2>&1 &
            echo "frontend deployment started; check /tmp/soulbook-frontend-deploy.log on the server"
